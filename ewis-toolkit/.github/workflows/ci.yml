name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,vis]"
      - name: Lint
        run: |
          ruff check .
      - name: Format check
        run: |
          black --check .
      - name: Type check
        run: |
          mypy ewis
      - name: Test
        run: |
          pytest -q --cov=ewis --cov-report=term-missing
