# Optogenetic Encoding Protocols for Biological Reservoirs

protocols:
  - id: "temporal_pulse_train_01"
    description: "High-frequency excitatory input for fading memory tests."
    target_opsin: "ChR2"
    wavelength_nm: 470
    pulse_width_ms: 5.0
    frequency_hz: 20.0
    duration_sec: 2.0
    spatial_target: "global_illumination"

  - id: "spatial_multiplex_02"
    description: "Dichromatic stimulation for separation of logical inputs."
    channels:
      - stream_A:
          target_opsin: "ChrimsonR"
          wavelength_nm: 590
          pulse_sequence: [10, 0, 10, 10, 0] # 10ms pulses
          spatial_target: "module_zone_alpha"
      - stream_B:
          target_opsin: "ChR2"
          wavelength_nm: 470
          pulse_sequence: [0, 10, 0, 0, 10]
          spatial_target: "module_zone_beta"

  - id: "inhibitory_reset_03"
    description: "Clears reservoir state using synchronous optical inhibition."
    target_opsin: "NpHR"
    wavelength_nm: 589
    pulse_width_ms: 100.0
    frequency_hz: 1.0
    duration_sec: 0.5
    spatial_target: "global_illumination"
