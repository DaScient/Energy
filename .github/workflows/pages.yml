name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent Pages deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -euo pipefail
          mkdir -p _site
          # Landing page + Jekyll opt-out marker.
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll
          # Embedded dashboards (each is a self-contained static webapp).
          mkdir -p _site/phiak _site/woik
          cp -R public-health-infra-analytics-kit/webapp/. _site/phiak/
          cp -R water-ops-interop-kit/webapp/. _site/woik/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
